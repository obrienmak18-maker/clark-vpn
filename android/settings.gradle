pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties( )
        def propertiesFile = file("local.properties")
        if (propertiesFile.exists()) { propertiesFile.withInputStream { properties.load(it) } }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        if (flutterSdkPath == null) { flutterSdkPath = System.getenv("FLUTTER_ROOT") }
        return flutterSdkPath
    }()
    if (flutterSdkPath != null) { includeBuild("$flutterSdkPath/packages/flutter_tools/gradle") }
    repositories { google(); mavenCentral(); gradlePluginPortal() }
}
plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.9.24" apply false
}
include ":app"
