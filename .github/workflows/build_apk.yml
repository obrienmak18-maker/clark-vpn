name: Build Android APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17', cache: 'gradle' }
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable' }
      - run: flutter pub get
      - run: flutter build apk --release --android-skip-build-dependency-validation --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with: { name: clark-vpn-apk, path: build/app/outputs/flutter-apk/*.apk }
